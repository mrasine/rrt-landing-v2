<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Rhythmic Ribbon of Texas</title>
  <link rel="canonical" href="https://rhythmicribbonoftexas.com/login.html">
  <meta property="og:title" content="Login | Rhythmic Ribbon of Texas">
  <meta property="og:description" content="Login to the Rhythmic Ribbon of Texas parent community board.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://rhythmicribbonoftexas.com/assets/logo.png">
  <meta property="og:url" content="https://rhythmicribbonoftexas.com/login.html">
  <meta name="description" content="Login to the Rhythmic Ribbon of Texas parent community board.">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="shortcut icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --rrt-gold: #d4af37;
      --rrt-soft-gold: #f1d28a;
      --rrt-cream: #f5f0e6;
      --rrt-muted: #888;
      --rrt-muted-light: #a0a0a0;
      --rrt-border: rgba(212, 175, 55, 0.2);
    }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #05070a;
      color: var(--rrt-cream);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: rgba(10, 15, 25, 0.9);
      padding: 40px;
      border-radius: 16px;
      border: 1px solid var(--rrt-border);
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-logo {
      height: 60px;
      margin-bottom: 10px;
      border-radius: 12px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--rrt-gold);
      margin: 0 0 30px;
      font-size: 1.8rem;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: var(--rrt-muted-light);
      font-size: 0.9rem;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid var(--rrt-border);
      background: rgba(5, 9, 20, 0.8);
      color: var(--rrt-cream);
      font-size: 1rem;
      font-family: inherit;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: var(--rrt-gold);
    }
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: var(--rrt-gold);
      color: #05070a;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 10px;
    }
    .btn:hover {
      background: var(--rrt-soft-gold);
    }
    .back-link {
      display: inline-block;
      margin-top: 25px;
      color: var(--rrt-muted-light);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover {
      color: var(--rrt-gold);
    }
    .error {
      color: #e74c3c;
      margin-top: 15px;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>
  <a href="#loginForm" class="skip-link">Skip to content</a>
  <div class="login-container">
    <img src="assets/logo.png" alt="RRT" class="login-logo">
    <h1>Welcome Back</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Any password works" required>
      </div>
      <button type="submit" class="btn">Sign In</button>
      <p class="error" id="error">Invalid credentials</p>
    </form>
    <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // Allow any credentials (including blank) - redirect to community
      window.location.href = '/community.html';
    });
  </script>
</body>
</html>
