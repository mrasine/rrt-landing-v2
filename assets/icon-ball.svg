<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Ball - circle with gradient effect -->
  <defs>
    <linearGradient id="ballGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6e6c8"/>
      <stop offset="100%" style="stop-color:#d4af37"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="24" fill="url(#ballGrad)" stroke="#d4af37" stroke-width="2"/>
  <!-- Shine -->
  <ellipse cx="24" cy="24" rx="8" ry="6" fill="rgba(255,255,255,0.4)"/>
</svg>
